name: Daily Tistory Blog Post

on:
  schedule:
    # UTC 00:00 = KST 09:00
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run blog pipeline
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SERPAPI_GEO: KR
          SERPAPI_ONLY_ACTIVE: "1"
          SERPAPI_HOURS: "24"
          SERPAPI_FALLBACK: "0"
          TISTORY_BLOG: happy-life-smile
          TISTORY_CATEGORY_ID: ${{ secrets.TISTORY_CATEGORY_ID }}
          TISTORY_COOKIE: ${{ secrets.TISTORY_COOKIE }}
          DRY_RUN: "0"
          PUBLISH_ONLY: "0"
          POST_LIMIT: "5"
          POST_DELAY_SECONDS: "60"
          PUBLISH_RETRIES: "3"
        run: python -u src/main.py

      - name: Save posted keyword history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posted_keywords.json
          git diff --staged --quiet || git commit -m "chore: update posted keywords"
          git push
